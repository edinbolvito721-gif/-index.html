<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Flores Amarillas</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --gold: #ffd54a;
      --gold-2: #ffb300;
      --gold-3: #ffde59;
      --bg-1: #090909;
      --bg-2: #171107;
      --leaf: #78d957;
      --leaf-2: #49b93d;
      --brown: #5f3413;
      --white: #fff8dd;
    }

    body {
      font-family: "Poppins", sans-serif;
      background:
        radial-gradient(circle at top, rgba(255, 196, 0, 0.16), transparent 25%),
        radial-gradient(circle at bottom, rgba(255, 208, 87, 0.12), transparent 30%),
        linear-gradient(180deg, #060606 0%, #120c04 50%, #070707 100%);
      color: white;
      overflow: hidden;
      height: 100vh;
    }

    .screen {
      position: fixed;
      inset: 0;
      display: grid;
      place-items: center;
      z-index: 30;
      background:
        radial-gradient(circle at center, rgba(255, 214, 74, 0.10), transparent 30%),
        linear-gradient(180deg, #050505 0%, #0b0905 100%);
      transition: opacity 1s ease, visibility 1s ease;
    }

    .screen.hidden {
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
    }

    .open-card {
      width: min(90vw, 430px);
      padding: 34px 24px;
      border-radius: 30px;
      text-align: center;
      background: rgba(255, 209, 71, 0.07);
      border: 1px solid rgba(255, 224, 120, 0.24);
      box-shadow:
        0 0 40px rgba(255, 196, 0, 0.14),
        inset 0 0 25px rgba(255, 225, 120, 0.05);
      backdrop-filter: blur(10px);
      animation: pulseCard 3s infinite ease-in-out;
    }

    .open-card h1 {
      font-family: "Great Vibes", cursive;
      font-size: 3.2rem;
      color: var(--gold);
      text-shadow:
        0 0 8px rgba(255, 196, 0, 0.6),
        0 0 22px rgba(255, 179, 0, 0.35);
      margin-bottom: 8px;
    }

    .open-card p {
      color: #fff4c9;
      font-size: 0.98rem;
      line-height: 1.5;
      opacity: 0.9;
      margin-bottom: 24px;
    }

    .open-btn {
      border: none;
      outline: none;
      cursor: pointer;
      font-size: 1.1rem;
      font-weight: 700;
      color: #2e1a00;
      background: linear-gradient(135deg, #ffe680, #ffbf00);
      padding: 14px 36px;
      border-radius: 999px;
      box-shadow:
        0 0 25px rgba(255, 200, 0, 0.4),
        inset 0 -3px 8px rgba(150, 95, 0, 0.18);
      transition: transform 0.2s ease, box-shadow 0.3s ease;
    }

    .open-btn:hover {
      transform: scale(1.05);
      box-shadow:
        0 0 35px rgba(255, 213, 74, 0.7),
        inset 0 -3px 8px rgba(150, 95, 0, 0.18);
    }

    .main {
      position: relative;
      width: 100%;
      height: 100vh;
      opacity: 0;
      transform: scale(1.02);
      transition: opacity 1.2s ease, transform 1.2s ease;
    }

    .main.show {
      opacity: 1;
      transform: scale(1);
    }

    .glow-bg {
      position: absolute;
      inset: 0;
      overflow: hidden;
      pointer-events: none;
    }

    .circle {
      position: absolute;
      border-radius: 50%;
      border: 2px solid rgba(255, 211, 82, 0.10);
      box-shadow: 0 0 18px rgba(255, 200, 0, 0.08);
      animation: floatSlow linear infinite;
    }

    .spark {
      position: absolute;
      width: 4px;
      height: 4px;
      background: #ffe680;
      border-radius: 50%;
      box-shadow: 0 0 10px #ffd54a;
      opacity: 0.8;
      animation: twinkle 2.8s infinite ease-in-out;
    }

    .content {
      position: relative;
      z-index: 5;
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      align-items: center;
      padding: 50px 18px 30px;
    }

    .title-box {
      text-align: center;
      margin-top: 10px;
      animation: fadeDown 1.6s ease;
    }

    .title-box h2 {
      font-family: "Great Vibes", cursive;
      font-size: clamp(2.4rem, 7vw, 5.2rem);
      line-height: 1.1;
      color: #ffc933;
      text-shadow:
        0 0 10px rgba(255, 193, 7, 0.85),
        0 0 30px rgba(255, 179, 0, 0.45),
        0 0 50px rgba(255, 193, 7, 0.2);
    }

    .subtitle {
      margin-top: 10px;
      color: #fff5c0;
      font-size: 0.95rem;
      letter-spacing: 0.5px;
      text-shadow: 0 0 10px rgba(255, 221, 130, 0.18);
    }

    .bouquet-wrap {
      position: relative;
      width: min(92vw, 520px);
      height: min(62vh, 620px);
      display: flex;
      justify-content: center;
      align-items: end;
      margin-bottom: 8px;
      animation: riseUp 1.8s ease;
    }

    .bouquet-glow {
      position: absolute;
      width: 80%;
      height: 45%;
      bottom: 10%;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(255, 214, 74, 0.35), transparent 68%);
      filter: blur(16px);
    }

    .flower {
      position: absolute;
      bottom: 110px;
      width: 120px;
      height: 120px;
      transform-origin: bottom center;
    }

    .stem {
      position: absolute;
      bottom: -130px;
      left: 50%;
      transform: translateX(-50%);
      width: 9px;
      height: 165px;
      border-radius: 99px;
      background: linear-gradient(180deg, #9cff9a, #42c257);
      box-shadow: 0 0 10px rgba(112, 255, 84, 0.28);
    }

    .leaf {
      position: absolute;
      width: 60px;
      height: 28px;
      background: radial-gradient(circle at 30% 30%, #a6ff73, #4dbb43 65%, #389637);
      border-radius: 60px 0 60px 0;
      box-shadow: 0 0 12px rgba(131, 255, 96, 0.22);
    }

    .leaf.left { left: -40px; bottom: -30px; transform: rotate(-30deg); }
    .leaf.right { right: -40px; bottom: -5px; transform: scaleX(-1) rotate(-30deg); }

    .petals {
      position: relative;
      width: 100%;
      height: 100%;
      animation: sway 4s infinite ease-in-out;
    }

    .petal {
      position: absolute;
      width: 42px;
      height: 72px;
      left: 50%;
      top: 50%;
      transform-origin: center bottom;
      margin-left: -21px;
      margin-top: -56px;
      background: linear-gradient(180deg, #ffe866, #ffb300 70%, #ff9600);
      border-radius: 50% 50% 45% 45%;
      box-shadow:
        0 0 14px rgba(255, 193, 7, 0.55),
        inset 0 -6px 10px rgba(255, 124, 0, 0.25);
    }

    .center {
      position: absolute;
      width: 58px;
      height: 58px;
      border-radius: 50%;
      background: radial-gradient(circle at 30% 30%, #7a481d, #4a240c 68%, #2e1307 100%);
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      box-shadow: inset 0 0 12px rgba(0,0,0,0.28);
      z-index: 5;
    }

    .center::after {
      content: "";
      position: absolute;
      inset: 14px;
      border-radius: 50%;
      box-shadow:
        10px 4px 0 rgba(38, 18, 8, 0.35),
        -8px -4px 0 rgba(38, 18, 8, 0.18),
        0 14px 0 rgba(38, 18, 8, 0.25);
    }

    .flower.f1 { left: 2%; transform: rotate(-14deg) scale(1.02); }
    .flower.f2 { left: 18%; bottom: 170px; transform: rotate(-8deg) scale(1.06); }
    .flower.f3 { left: 38%; bottom: 120px; transform: rotate(0deg) scale(1.10); }
    .flower.f4 { right: 18%; bottom: 170px; transform: rotate(8deg) scale(1.06); }
    .flower.f5 { right: 2%; transform: rotate(14deg) scale(1.02); }

    .falling-area {
      position: absolute;
      inset: 0;
      overflow: hidden;
      pointer-events: none;
      z-index: 4;
    }

    .fall {
      position: absolute;
      top: -60px;
      font-size: 18px;
      opacity: 0.9;
      animation-name: fallDown;
      animation-timing-function: linear;
      animation-iteration-count: infinite;
      filter: drop-shadow(0 0 8px rgba(255, 215, 0, 0.35));
    }

    .footer-note {
      position: relative;
      z-index: 6;
      text-align: center;
      color: #ffeeb0;
      opacity: 0.88;
      font-size: 0.9rem;
      padding-bottom: 8px;
      text-shadow: 0 0 10px rgba(255, 215, 90, 0.15);
    }

    @keyframes pulseCard {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-6px); }
    }

    @keyframes fadeDown {
      from { opacity: 0; transform: translateY(-28px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes riseUp {
      from { opacity: 0; transform: translateY(40px) scale(0.95); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }

    @keyframes sway {
      0%, 100% { transform: rotate(0deg); }
      50% { transform: rotate(2deg); }
    }

    @keyframes twinkle {
      0%, 100% { opacity: 0.2; transform: scale(0.8); }
      50% { opacity: 1; transform: scale(1.4); }
    }

    @keyframes floatSlow {
      from { transform: translateY(0) rotate(0deg); }
      to { transform: translateY(-40px) rotate(360deg); }
    }

    @keyframes fallDown {
      0% {
        transform: translateY(-60px) translateX(0) rotate(0deg);
        opacity: 0;
      }
      10% { opacity: 1; }
      100% {
        transform: translateY(110vh) translateX(60px) rotate(360deg);
        opacity: 0.15;
      }
    }

    @media (max-width: 560px) {
      .bouquet-wrap {
        height: 54vh;
      }

      .flower {
        width: 95px;
        height: 95px;
      }

      .petal {
        width: 34px;
        height: 58px;
        margin-left: -17px;
        margin-top: -45px;
      }

      .center {
        width: 46px;
        height: 46px;
      }

      .stem {
        height: 140px;
        bottom: -110px;
      }

      .leaf {
        width: 48px;
        height: 23px;
      }
    }
  </style>
</head>
<body>
  <div class="screen" id="startScreen">
    <div class="open-card">
      <h1>Flores Amarillas</h1>
      <p>
        Una sorpresa bonita, brillante y llena de flores amarillas.
      </p>
      <button class="open-btn" id="openBtn">Abrir</button>
    </div>
  </div>

  <main class="main" id="mainContent">
    <div class="glow-bg" id="bgDecor"></div>
    <div class="falling-area" id="fallingArea"></div>

    <div class="content">
      <div class="title-box">
        <h2>Feliz día de las<br>Flores Amarillas 💛</h2>
        <div class="subtitle">Un detalle bonito para alguien especial</div>
      </div>

      <div class="bouquet-wrap">
        <div class="bouquet-glow"></div>

        <div class="flower f1">
          <div class="petals"></div>
          <div class="center"></div>
          <div class="stem"></div>
          <div class="leaf left"></div>
          <div class="leaf right"></div>
        </div>

        <div class="flower f2">
          <div class="petals"></div>
          <div class="center"></div>
          <div class="stem"></div>
          <div class="leaf left"></div>
          <div class="leaf right"></div>
        </div>

        <div class="flower f3">
          <div class="petals"></div>
          <div class="center"></div>
          <div class="stem"></div>
          <div class="leaf left"></div>
          <div class="leaf right"></div>
        </div>

        <div class="flower f4">
          <div class="petals"></div>
          <div class="center"></div>
          <div class="stem"></div>
          <div class="leaf left"></div>
          <div class="leaf right"></div>
        </div>

        <div class="flower f5">
          <div class="petals"></div>
          <div class="center"></div>
          <div class="stem"></div>
          <div class="leaf left"></div>
          <div class="leaf right"></div>
        </div>
      </div>

      <div class="footer-note">Hecho con amor, luz y muchas flores amarillas ✨</div>
    </div>
  </main>

  <script>
    const openBtn = document.getElementById("openBtn");
    const startScreen = document.getElementById("startScreen");
    const mainContent = document.getElementById("mainContent");
    const fallingArea = document.getElementById("fallingArea");
    const bgDecor = document.getElementById("bgDecor");

    function createPetals() {
      document.querySelectorAll(".petals").forEach((wrap) => {
        for (let i = 0; i < 12; i++) {
          const p = document.createElement("span");
          p.className = "petal";
          p.style.transform = `translate(-50%, -50%) rotate(${i * 30}deg) translateY(-28px)`;
          wrap.appendChild(p);
        }
      });
    }

    function createFallingFlowers() {
      const icons = ["🌼", "💛", "✨", "🌻"];
      for (let i = 0; i < 34; i++) {
        const el = document.createElement("div");
        el.className = "fall";
        el.textContent = icons[Math.floor(Math.random() * icons.length)];
        el.style.left = Math.random() * 100 + "vw";
        el.style.animationDuration = (7 + Math.random() * 8) + "s";
        el.style.animationDelay = (Math.random() * 8) + "s";
        el.style.fontSize = (14 + Math.random() * 18) + "px";
        fallingArea.appendChild(el);
      }
    }

    function createDecor() {
      for (let i = 0; i < 18; i++) {
        const c = document.createElement("div");
        c.className = "circle";
        const size = 30 + Math.random() * 70;
        c.style.width = size + "px";
        c.style.height = size + "px";
        c.style.left = Math.random() * 100 + "%";
        c.style.top = Math.random() * 100 + "%";
        c.style.animationDuration = (18 + Math.random() * 16) + "s";
        c.style.opacity = 0.15 + Math.random() * 0.2;
        bgDecor.appendChild(c);
      }

      for (let i = 0; i < 48; i++) {
        const s = document.createElement("div");
        s.className = "spark";
        s.style.left = Math.random() * 100 + "%";
        s.style.top = Math.random() * 100 + "%";
        s.style.animationDelay = (Math.random() * 3) + "s";
        s.style.animationDuration = (1.5 + Math.random() * 3) + "s";
        bgDecor.appendChild(s);
      }
    }

    openBtn.addEventListener("click", () => {
      startScreen.classList.add("hidden");
      setTimeout(() => {
        mainContent.classList.add("show");
      }, 250);
    });

    createPetals();
    createFallingFlowers();
    createDecor();
  </script>
</body>
</html>
